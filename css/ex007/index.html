<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        div{
            background-color: lightsalmon;
            width: 200px; /* Largure */
            height: 200px; /* Altura */
            border: 3px solid black;
            margin-bottom: 20px;
            margin-top: 20px;
            text-align: center;
        }

        
        div:hover{
            background-color: lightgreen;
            color: white;
            font-size: 40px;
            width: 250px;
            height: 250px;
        }

    </style>
</head>
<body>
    <h1>Trabalhando com Pseudo-classes</h1>

    <div>01</div>
    <div>02</div>
    <div>03</div>
</body>
</html>
