<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Brasil Viagens</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:#f5f5f5;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

}

.container{

    width:400px;

    background:white;

    padding:30px;

    border-radius:10px;

    box-shadow:0 0 15px rgba(0,0,0,.1);

}

h1{

    text-align:center;

    margin-bottom:20px;

}

input{

    width:100%;

    padding:12px;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:5px;

}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:5px;

    background:#0077ff;

    color:white;

    cursor:pointer;

}

button:hover{

    background:#005ecc;

}

#mensagem{

    text-align:center;

    margin-top:15px;

}

a{

    text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

    <h1>Criar Conta</h1>

    <input
        type="text"
        id="nome"
        placeholder="Nome Completo"
    >

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="senha"
        placeholder="Senha"
    >

    <button onclick="cadastrar()">

        Cadastrar

    </button>

    <p id="mensagem"></p>

    <br>

    <p align="center">

        Já possui conta?

        <a href="login.html">

            Entrar

        </a>

    </p>

</div>

<script>

async function cadastrar(){

    const nome =
    document.getElementById("nome").value;

    const email =
    document.getElementById("email").value;

    const senha =
    document.getElementById("senha").value;

    if(
        nome === "" ||
        email === "" ||
        senha === ""
    ){

        document.getElementById(
            "mensagem"
        ).innerText =
        "Preencha todos os campos.";

        return;

    }

    try{

        const resposta = await fetch(

            "http://localhost:3000/cadastro",

            {

                method:"POST",

                headers:{

                    "Content-Type":
                    "application/json"

                },

                body:JSON.stringify({

                    nome,
                    email,
                    senha

                })

            }

        );

        const dados =
        await resposta.json();

        document.getElementById(
            "mensagem"
        ).innerText =
        dados.sucesso;

        setTimeout(() => {

            window.location =
            "login.html";

        },1500);

    }

    catch(error){

        document.getElementById(
            "mensagem"
        ).innerText =
        "Erro ao conectar ao servidor.";

    }

}

</script>

</body>
</html>
