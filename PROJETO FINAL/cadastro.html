<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Brasil Viagens</title>

<link rel="stylesheet" href="style.css">

<style>

.container{

    max-width: 450px;

    margin: 80px auto;

    background: white;

    padding: 30px;

    border-radius: 10px;

    box-shadow: 0 0 15px rgba(0,0,0,.1);

}

.container h1{

    text-align: center;

    margin-bottom: 20px;

}

.container input{

    width: 100%;

    padding: 12px;

    margin-bottom: 15px;

}

.container button{

    width: 100%;

    padding: 12px;

    background: #0077ff;

    color: white;

    border: none;

    cursor: pointer;

}

.mensagem{

    text-align: center;

    margin-top: 15px;

}

</style>

</head>

<body>

<div class="container">

    <h1>Criar Conta</h1>

    <input
        type="text"
        id="nome"
        placeholder="Digite seu nome"
    >

    <input
        type="email"
        id="email"
        placeholder="Digite seu email"
    >

    <input
        type="password"
        id="senha"
        placeholder="Digite sua senha"
    >

    <button onclick="cadastrar()">
        Cadastrar
    </button>

    <p class="mensagem" id="mensagem"></p>

    <p style="text-align:center; margin-top:15px;">

        Já possui conta?

        <a href="login.html">
            Fazer Login
        </a>

    </p>

</div>

<script>

async function cadastrar(){

    let nome =
    document.getElementById("nome").value;

    let email =
    document.getElementById("email").value;

    let senha =
    document.getElementById("senha").value;

    if(
        nome === "" ||
        email === "" ||
        senha === ""
    ){

        alert("Preencha todos os campos!");

        return;

    }

    let resposta = await fetch(

        "http://localhost:3000/cadastro",

        {

            method: "POST",

            headers: {

                "Content-Type":
                "application/json"

            },

            body: JSON.stringify({

                nome,
                email,
                senha

            })

        }

    );

    let dados =
    await resposta.json();

    let mensagem =
    document.getElementById("mensagem");

    if(dados.erro){

        mensagem.style.color = "red";

        mensagem.innerText =
        dados.erro;

    }
    else{

        mensagem.style.color = "green";

        mensagem.innerText =
        dados.sucesso;

        setTimeout(function(){

            window.location =
            "login.html";

        }, 1500);

    }

}

</script>

</body>
</html>
