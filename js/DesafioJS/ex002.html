<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        h2{
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }
        
        body{
          font-family: Arial, sans-serif;
          background: #f2f2f2;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
    
        .login-box{
          background: white;
          padding: 30px;
          border-radius: 10px;
          width: 250px;
          box-shadow: 0 0 10px rgba(9, 255, 0, 0.781);
        }
    
        input{
          width: 100%;
          padding: 10px;
          margin: 10px 0;
        }
    
        button{
          width: 100%;
          padding: 20px;
          border: none;
          background: #4CAF50;
          color: white;
          cursor: pointer;
          border-radius: 5px;
        }
    
        button:hover{
          background: #45a049;
        }

        label {
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

      </style>

</head>
<body>

    <div class="login-box">
    <h2>Login</h2>

    <form id="form">

    <label for="email"><strong>Email:</strong></label>
    <input type="email" name="email" id="email">
    <label for="senha"><strong>Senha:</strong></label>
    <input type="password" id="senha">

    </form>
    <p class="erro" id="erro"></p>

    <button onclick="entrar()">Enviar</button>
  </div>

  <script>
    function entrar(){

      
      const gmailCorreto = "heitor@gmail.com";
      const senhaCorreta = "123456";

      
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      
      if(email === gmailCorreto && senha === senhaCorreta){
        window.location.href = "paginaLogada.html";
      } else {
        document.getElementById("erro").innerText = "Gmail ou senha incorretos!";
      }
    }
  </script>

</body>
</html>
