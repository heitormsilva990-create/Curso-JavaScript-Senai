<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
    <style>
        #quadrado{
            background-color: lightgreen;
            width: 200px;
            height: 200px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com eventos do JS</h1>

    <div id="quadrado">
        Oi
    </div>

    <script>
        const elemento = document.getElementById('quadrado')
        
        elemento.addEventListener('click', mudarQuadadoAoClicar )
        elemento.addEventListener('mouseenter', mudarQuadadoAoEntrar)
        elemento.addEventListener('mouseout', mudarQuadadoAoSair)
        ////////////////////////////////////////////////////////////////////////   

        function mudarQuadadoAoClicar(event){
            elemento.innerHTML = 'Foi clicado!'
            elemento.style.backgroundColor = 'red'
            
        }

        function mudarQuadadoAoEntrar(event){
            console.log('O MOUSE ENTROU NO ELEMENTO!!')
            elemento.innerHTML = 'Entrou. . .'

        }

        function mudarQuadadoAoSair(event){
            elemento.innerHTML = "Saiu!!"
            elemento.style.backgroundColor = "lightgreen"

        }

    </script>
</body>
</html>
