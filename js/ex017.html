<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        label, #email{
            display: block;
        }

        .label-radio{
            display: inline;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com formularios</h1>

    <form method="post">

        <label for="nome"> Nome: </label>
        <input type="text" id="nome" required>
        
        <label for="idade">Idade</label>
        <input type="number" name="idade" id="idade" min="5" max="10" required>

        <label for="">Notas</label>
        <input type="number" name="notas" id="notas" min="0" max="10" step="0.1">

        <label for="password">Senha</label>
        <input type="password" name="" id="password">

        <label for="">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="Casado" class="label-radio">Casado</label>
        <input type="radio" name="status" id="Casado">
        
        <label for="solteiro" class="label-radio">Solteiro</label>
        <input type="radio" name="status" id="Solteiro">

        <label for="Viuvo" class="label-radio">Viuvo</label>
        <input type="radio" name="status" id="Viuvo">

        <label for="">Bike</label>
        <input type="checkbox" name="" id="">

        <label for="">Natação</label>
        <input type="checkbox" name="" id="">

        <label for="">Boxe</label>
        <input type="checkbox" name="" id="">

        <button type="submit">Enviar</button>       
    </form>
</body>
</html>
