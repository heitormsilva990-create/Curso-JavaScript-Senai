<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
        }

       form {
        background-color: aliceblue;
        width: 300px;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid black;
        box-shadow: 0px 0px 10px black;
       }

       label {
        display: block;
        margin-bottom: 10px;
       }

       input {
        width: 100%;
        margin-bottom: 10px;
        padding: 5px;
        border-radius: 10px;
        border: none;
        box-shadow: 2px 1px 5px 0px rgb(0, 0, 151); 
       }

       .radio, 
       .checkbox {
           width: 10%;
           box-shadow: 0px 0px 0px 0px;
       }

       button {
        width: 100%;
        padding: 10px;
        background-color: blue;
        color: white;
        margin-top: 20px;
        border-radius: 10px;
        cursor: pointer;
        border: none;
        box-shadow: 5px 5px 5px 0px rgb(1, 1, 1.5); 
       }

       button:hover {
            background-color: rgb(0, 0, 151);
       }

       input:focus {
        outline: none;
        box-shadow: 2px 1px 5px 0px rgb(0, 0, 151); 
       }

       
    </style>
</head>
<body>

    <form id="form">
        <h1>Trabalhando com formularios</h1>
        <label for="nome"> Nome: </label>
        <input type="text" id="nome">
        
        <label for="idade">Idade</label>
        <input type="number" name="idade" id="idade" min="5" max="10">

        <label for="">Notas</label>
        <input type="number" name="notas" id="notas" min="0" max="10" step="0.1">

        <label for="password">Senha</label>
        <input type="password" name="" id="password">

        <label for="">Email:</label>
        <input type="email" name="email" id="email">

        <label for="">Estado Civil:</label>
        <input class="radio" type="radio" name="status" id="Casado">Casado
        <input class="radio" type="radio" name="status" id="Solteiro">Solteiro
        <input class="radio" type="radio" name="status" id="Viuvo">Viuvo

        <label for="">Atividaes</label>
        <input class="checkbox" type="checkbox" name="Bike" id="Bike">Bike
        <input class="checkbox" type="checkbox" name="Natação" id="Natação">Natação
        <input class="checkbox" type="checkbox" name="Boxe" id="Boxe">Boxe

        <button type="submit">Enviar</button>       
    </form>


    <script>
        let form = document.getElementById('form')
        form.addEventListener('submit', function (){
            event.preventDefault("") // PARA CANCELAR/PREVENIR O COMPORTAMENTO PADRÃO (Enviar o comportamento padrão)
            console.log("O SUBMIT ACONTECEU!!")

            let nomeUsuario = document.getElementById('nome').value
            alert(`Olá ${nomeUsuario}! Formulario enviado!!`)
        })

        // let input = document.querySelectorAll('.checkbox')
        
        // console.log("Input", input)

    let body = document.querySelector('body')
    body.addEventListener('keypress', function(event){
          
         if (event.key == 'f'){
          window.location.href = 'paginaLogada.html'
          console.log("A TECLA 'F' FOI PRESSIONADA")
        }
    
    })

    </script>
</body>
</html>
